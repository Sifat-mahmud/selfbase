version: "3.9"

# SelfBase — production Docker Compose stack
# Start: docker compose up -d
# Stop:  docker compose down
# Logs:  docker compose logs -f [service]

x-common: &common
  restart: unless-stopped
  env_file: .env
  networks:
    - selfbase

services:

  # ── Data stores ─────────────────────────────────────────────────────────────

  postgres:
    <<: *common
    image: pgvector/pgvector:pg16
    container_name: selfbase-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASS}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - /var/selfbase/postgres:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    <<: *common
    image: redis:7-alpine
    container_name: selfbase-redis
    command: redis-server --appendonly yes
    volumes:
      - /var/selfbase/redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    <<: *common
    image: minio/minio:latest
    container_name: selfbase-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - /var/selfbase/minio:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Core services ───────────────────────────────────────────────────────────

  gateway:
    <<: *common
    build: ./services/gateway
    container_name: selfbase-gateway
    ports:
      - "${GATEWAY_PORT:-3000}:3000"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - ./selfbase.yml:/app/selfbase.yml:ro

  realtime:
    <<: *common
    build: ./services/realtime
    container_name: selfbase-realtime
    ports:
      - "${REALTIME_PORT:-3001}:3001"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  auth:
    <<: *common
    build: ./services/auth
    container_name: selfbase-auth
    ports:
      - "${AUTH_PORT:-3002}:3002"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  api:
    <<: *common
    build: ./services/api
    container_name: selfbase-api
    ports:
      - "127.0.0.1:3003:3003"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  storage:
    <<: *common
    build: ./services/storage
    container_name: selfbase-storage
    ports:
      - "127.0.0.1:3004:3004"
    depends_on:
      minio: { condition: service_healthy }
    volumes:
      - /var/selfbase/uploads:/app/uploads

  functions:
    <<: *common
    build: ./services/functions
    container_name: selfbase-functions
    ports:
      - "127.0.0.1:3005:3005"
    depends_on:
      postgres: { condition: service_healthy }

  # ── AI layer ────────────────────────────────────────────────────────────────

  ai:
    <<: *common
    build: ./services/ai
    container_name: selfbase-ai
    ports:
      - "127.0.0.1:3006:3006"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  # ── Ingestion engine ────────────────────────────────────────────────────────

  ingestion:
    <<: *common
    build: ./services/ingestion
    container_name: selfbase-ingestion
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }

  # ── Monitor ─────────────────────────────────────────────────────────────────

  monitor:
    <<: *common
    build: ./services/monitor
    container_name: selfbase-monitor
    ports:
      - "127.0.0.1:3007:3007"
    depends_on:
      postgres: { condition: service_healthy }

  # ── Admin Studio ────────────────────────────────────────────────────────────

  studio:
    <<: *common
    build: ./studio
    container_name: selfbase-studio
    ports:
      - "${STUDIO_PORT:-4000}:4000"
    depends_on:
      - gateway

networks:
  selfbase:
    driver: bridge
